name = "Pandoc Markdown"
grammar = "pandoc_markdown"
path_suffixes = ["md", "markdown", "qmd", "rmd", "MD"]
modeline_aliases = ["md", "markdown", "pandoc"]
# Keep citation and Pandoc cross-reference completions active for keys such as
# [@doe-2024], [@fig:plot], and [@sec.intro]. Do not include "[" here:
# completion items are labeled "@...", so treating "[" as part of the query
# makes Zed filter out bracketed citation completions.
completion_query_characters = [
  "@",
  "-",
  "_",
  ":",
  ".",
  "$",
  "%",
  "&",
  "+",
  "?",
  "<",
  ">",
  "~",
  "/",
]
block_comment = { start = "<!--", prefix = "", end = "-->", tab_size = 1 }
autoclose_before = ";:.,=}])>"
brackets = [
  { start = "\\[", end = "\\]", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "<", end = ">", close = true, newline = true },
  { start = "$", end = "$", close = true, newline = false, surround = true },
  { start = "\"", end = "\"", close = false, newline = false },
  { start = "'", end = "'", close = false, newline = false },
  { start = "`", end = "`", close = false, newline = false },
  { start = "*", end = "*", close = false, newline = false, surround = true },
  { start = "_", end = "_", close = false, newline = false, surround = true },
]
rewrap_prefixes = [
  "[-*+]\\s+",
  "\\d+\\.\\s+",
  ">\\s*",
  "[-*+]\\s+\\[[\\sx]\\]\\s+",
]
unordered_list = ["- ", "* ", "+ "]
ordered_list = [{ pattern = "(\\d+)\\. ", format = "{1}. " }]
task_list = { prefixes = ["- [ ] ", "- [x] ", "- [X] "], continuation = "- [ ] " }

auto_indent_on_paste = false
auto_indent_using_last_non_empty_line = false
tab_size = 2
decrease_indent_patterns = [
  { pattern = "^\\s*-", valid_after = ["list_item"] },
  { pattern = "^\\s*\\d", valid_after = ["list_item"] },
  { pattern = "^\\s*", valid_after = ["list_item"] },
]
